<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>溯源 · 回到知识的发生现场</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Noto+Serif+SC:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1525;
    --slate:#16203A;
    --slate-2:#1D2A47;
    --amber:#E8A33D;
    --amber-dim:#b6802f;
    --teal:#5BA8A0;
    --parchment:#F2EDE2;
    --muted:#8B95A8;
    --line:rgba(242,237,226,.10);
    --line-strong:rgba(242,237,226,.18);
    --serif:"Newsreader","Noto Serif SC",Georgia,serif;
    --sc:"Noto Serif SC",serif;
    --sans:"Inter",-apple-system,system-ui,sans-serif;
    --mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--ink);
    color:var(--parchment);
    font-family:var(--sans);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  ::selection{background:var(--amber);color:var(--ink)}
  a{color:inherit}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  .wrap{max-width:1180px;margin:0 auto;padding:0 28px}

  /* ---------- top bar ---------- */
  header.bar{
    position:sticky;top:0;z-index:50;
    background:rgba(14,21,37,.82);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
  }
  .bar-in{display:flex;align-items:center;justify-content:space-between;height:62px}
  .brand{display:flex;align-items:center;gap:11px;font-family:var(--sc);font-weight:600;letter-spacing:.04em;font-size:18px}
  .brand .glyph{
    width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 50% 35%, var(--amber), var(--amber-dim) 70%);
    box-shadow:0 0 16px rgba(232,163,61,.5);position:relative;flex:none;
  }
  .brand .glyph::after{content:"";position:absolute;inset:7px;border-radius:50%;background:var(--ink)}
  .brand small{font-family:var(--mono);font-weight:400;font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
  .bar-status{
    font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--teal);
    display:flex;align-items:center;gap:7px;
  }
  .bar-status::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal)}
  .source-bar{
    display:flex;align-items:center;gap:14px;margin-top:22px;padding-top:16px;
    border-top:1px solid var(--line);flex-wrap:wrap;
  }
  .src-label{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--muted);
    border:1px solid var(--line-strong);border-radius:6px;padding:4px 10px}
  .src-label.live{color:var(--teal);border-color:rgba(91,168,160,.4)}
  .relive{
    font-family:var(--sc);font-size:13px;color:var(--amber);
    border:1px solid rgba(232,163,61,.4);border-radius:8px;padding:7px 15px;transition:.16s;
  }
  .relive:hover{background:var(--amber);color:var(--ink)}

  /* ---------- 费曼类比 ---------- */
  .analogy-entry{
    margin-top:18px;border:1px solid var(--line);border-radius:14px;
    background:linear-gradient(180deg, rgba(91,168,160,.06), transparent);padding:20px 22px;
  }
  .ae-head{margin-bottom:14px}
  .ae-title{font-family:var(--sc);font-weight:600;font-size:16px;color:var(--parchment);display:block}
  .ae-sub{font-size:13px;color:var(--muted);line-height:1.5;display:block;margin-top:4px}
  .ae-scenes{display:flex;flex-wrap:wrap;gap:9px;align-items:center}
  .ae-chip{
    font-family:var(--sc);font-size:14px;color:#cfc8ba;border:1px solid var(--line-strong);
    border-radius:20px;padding:7px 16px;transition:.16s;
  }
  .ae-chip:hover{border-color:var(--teal);color:var(--parchment);background:rgba(91,168,160,.1)}
  .ae-or{font-family:var(--mono);font-size:11px;color:var(--muted);margin:0 2px}
  .ae-input{
    flex:1;min-width:180px;background:var(--ink);border:1px solid var(--line-strong);border-radius:9px;
    color:var(--parchment);font-family:var(--sc);font-size:14px;padding:9px 13px;
  }
  .ae-input:focus{outline:none;border-color:var(--teal)}
  .ae-input::placeholder{color:#5c6680}
  .ae-go{
    font-family:var(--sc);font-weight:600;font-size:14px;color:var(--ink);background:var(--teal);
    border-radius:9px;padding:9px 18px;transition:.16s;white-space:nowrap;
  }
  .ae-go:hover{background:#6fbcb3}
  .ae-result{margin-top:4px}

  .ae-card{
    margin-top:18px;border:1px solid rgba(91,168,160,.28);border-radius:13px;
    background:var(--slate);padding:20px 22px;animation:rise .45s both;
  }
  .ae-card-head{display:flex;align-items:center;gap:11px;margin-bottom:13px;flex-wrap:wrap}
  .ae-badge{font-family:var(--sc);font-weight:600;font-size:14px;color:var(--ink);background:var(--teal);border-radius:7px;padding:5px 13px}
  .ae-arrow{font-family:var(--serif);font-size:20px;color:var(--muted)}
  .ae-topic{font-family:var(--sc);font-weight:600;font-size:16px;color:var(--amber)}
  .ae-hook{font-family:var(--serif);font-style:italic;font-size:18px;line-height:1.5;color:var(--parchment);margin-bottom:16px}
  .ae-maps{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
  .ae-map{
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;
    background:var(--ink);border:1px solid var(--line);border-radius:10px;padding:13px 15px;
  }
  .ae-map-life{font-family:var(--sc);font-size:14.5px;color:var(--teal);font-weight:600}
  .ae-map-link{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.05em;white-space:nowrap}
  .ae-map-know{font-size:14px;color:#cfc8ba;line-height:1.5}
  .ae-walk{font-size:15px;color:#dcd6c9;line-height:1.7;margin-bottom:14px}
  .ae-aha{
    border-left:2px solid var(--teal);padding:10px 0 10px 16px;margin-bottom:14px;
    font-family:var(--serif);font-style:italic;font-size:17px;line-height:1.5;color:var(--parchment);
  }
  .ae-limit{background:rgba(232,163,61,.07);border:1px solid rgba(232,163,61,.22);border-radius:10px;padding:13px 16px;font-size:13.5px;color:#cfc8ba;line-height:1.55}
  .ae-limit b{color:var(--amber)}
  .ae-actions{display:flex;gap:10px;margin-top:13px;flex-wrap:wrap}
  .ae-save{
    font-family:var(--sc);font-size:13px;font-weight:600;color:var(--ink);background:var(--amber);
    border-radius:8px;padding:7px 15px;transition:.16s;
  }
  .ae-save:hover{background:#f2b658}
  .ae-save.done{background:transparent;color:var(--teal);border:1px solid rgba(91,168,160,.4);font-weight:500;cursor:default}
  .ae-again{font-family:var(--sc);font-size:13px;color:var(--muted);border:1px solid var(--line-strong);border-radius:8px;padding:7px 15px;transition:.16s}
  .ae-again:hover{color:var(--parchment);border-color:var(--teal)}
  @media(max-width:560px){.ae-map{grid-template-columns:1fr;gap:5px;text-align:left}.ae-map-link{justify-self:start}}

  /* ---------- hero ---------- */
  .hero{padding:74px 0 30px;position:relative}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);margin-bottom:22px}
  .hero h1{
    font-family:var(--serif);font-weight:400;font-size:clamp(34px,6vw,62px);
    line-height:1.08;letter-spacing:-.01em;max-width:16ch;margin-bottom:24px;
  }
  .hero h1 em{font-style:italic;color:var(--amber)}
  .hero p.lede{font-size:clamp(15px,2vw,18px);color:#c9c2b4;max-width:54ch;margin-bottom:6px}
  .hero p.lede b{color:var(--parchment);font-weight:500}

  /* the live problem field */
  .field{
    margin-top:42px;border:1px solid var(--line-strong);border-radius:16px;
    background:linear-gradient(180deg, var(--slate), var(--ink));
    padding:30px 30px 26px;position:relative;overflow:hidden;
  }
  .field::before{
    content:"";position:absolute;left:-10%;bottom:-60%;width:120%;height:120%;
    background:radial-gradient(ellipse at 50% 100%, rgba(232,163,61,.16), transparent 60%);
    pointer-events:none;
  }
  .field-label{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;position:relative}
  .field-row{display:flex;gap:12px;position:relative;flex-wrap:wrap}
  .field-input{
    flex:1;min-width:240px;background:var(--ink);border:1px solid var(--line-strong);
    border-radius:10px;color:var(--parchment);font-family:var(--sc);font-size:16px;
    padding:15px 17px;transition:.18s;
  }
  .field-input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(232,163,61,.12)}
  .field-input::placeholder{color:#5c6680}
  .dig{
    background:var(--amber);color:var(--ink);font-weight:600;font-size:15px;
    border-radius:10px;padding:0 26px;display:flex;align-items:center;gap:9px;
    transition:.16s;white-space:nowrap;
  }
  .dig:hover{background:#f2b658;transform:translateY(-1px)}
  .dig:active{transform:translateY(0)}
  .dig:disabled{opacity:.5;cursor:wait;transform:none}
  .chips{display:flex;gap:9px;flex-wrap:wrap;margin-top:16px;position:relative}
  .chip{
    font-size:13px;color:#c9c2b4;border:1px solid var(--line);border-radius:20px;
    padding:6px 14px;transition:.16s;font-family:var(--sc);
  }
  .chip:hover{border-color:var(--teal);color:var(--parchment);background:rgba(91,168,160,.08)}

  /* ---------- engine tabs ---------- */
  .engines{padding:40px 0 8px}
  .engines-head{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
  .engine-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .engine{
    text-align:left;border:1px solid var(--line);border-radius:13px;padding:18px 17px 16px;
    background:var(--slate);transition:.18s;position:relative;overflow:hidden;
  }
  .engine:hover{border-color:var(--line-strong);transform:translateY(-2px)}
  .engine.active{border-color:var(--amber);background:var(--slate-2)}
  .engine.active::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--amber)}
  .engine .n{font-family:var(--mono);font-size:11px;color:var(--amber);letter-spacing:.1em}
  .engine h3{font-family:var(--sc);font-weight:600;font-size:16px;margin:9px 0 6px}
  .engine p{font-size:12.5px;color:var(--muted);line-height:1.5}

  /* ---------- canvas / strata ---------- */
  .canvas{padding:30px 0 90px;min-height:200px}
  .empty{
    text-align:center;color:var(--muted);font-family:var(--sc);font-size:15px;
    padding:60px 0;border:1px dashed var(--line);border-radius:14px;
  }
  .empty .big{font-family:var(--serif);font-style:italic;font-size:22px;color:#c9c2b4;display:block;margin-bottom:8px}

  .result-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:6px;flex-wrap:wrap}
  .result-head h2{font-family:var(--serif);font-weight:500;font-size:clamp(24px,4vw,36px);letter-spacing:-.01em}
  .result-head .mode-tag{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);border:1px solid rgba(91,168,160,.3);border-radius:6px;padding:4px 10px;white-space:nowrap}
  .result-sub{color:var(--muted);font-size:14px;margin-bottom:30px;font-family:var(--sc)}

  /* strata = vertical dig (engine 1 & 3) */
  .strata{position:relative;padding-left:34px}
  .strata::before{content:"";position:absolute;left:9px;top:8px;bottom:18px;width:2px;
    background:linear-gradient(180deg,var(--line-strong),var(--amber));}
  .layer{position:relative;margin-bottom:14px;animation:rise .5s both}
  .layer .node{position:absolute;left:-34px;top:20px;width:20px;height:20px;border-radius:50%;
    background:var(--ink);border:2px solid var(--amber-dim);display:flex;align-items:center;justify-content:center}
  .layer .node::after{content:"";width:6px;height:6px;border-radius:50%;background:var(--amber-dim)}
  .layer:last-child .node{border-color:var(--amber);box-shadow:0 0 14px rgba(232,163,61,.5)}
  .layer:last-child .node::after{background:var(--amber)}
  .layer-card{
    background:var(--slate);border:1px solid var(--line);border-radius:12px;padding:18px 20px;
    transition:.18s;
  }
  .layer-card:hover{border-color:var(--line-strong)}
  .layer .tier{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:8px}
  .layer .tier b{color:var(--amber);font-weight:500}
  .layer h4{font-family:var(--sc);font-weight:600;font-size:17px;margin-bottom:7px}
  .layer p{font-size:14.5px;color:#cfc8ba;line-height:1.66}
  .layer.origin .layer-card{border-color:rgba(232,163,61,.4);background:linear-gradient(180deg,rgba(232,163,61,.07),var(--slate))}

  /* fork = lateral branches (engine 2) */
  .fork-root{
    background:linear-gradient(180deg,rgba(232,163,61,.1),var(--slate));
    border:1px solid rgba(232,163,61,.4);border-radius:14px;padding:22px 24px;margin-bottom:8px;
  }
  .fork-root .tier{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:8px}
  .fork-root h4{font-family:var(--serif);font-style:italic;font-weight:400;font-size:22px;line-height:1.3;margin-bottom:8px}
  .fork-root p{color:#cfc8ba;font-size:14.5px}
  .fork-stem{height:26px;width:2px;background:var(--line-strong);margin-left:34px}
  .branches{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:13px}
  .branch{background:var(--slate);border:1px solid var(--line);border-top:2px solid var(--teal);
    border-radius:0 0 12px 12px;padding:17px 18px;animation:rise .5s both;transition:.18s}
  .branch:hover{border-color:var(--line-strong);border-top-color:var(--teal);transform:translateY(-2px)}
  .branch .disc{font-family:var(--sc);font-weight:600;font-size:15px;color:var(--teal);margin-bottom:7px}
  .branch h5{font-family:var(--sc);font-size:14px;font-weight:600;margin-bottom:6px}
  .branch p{font-size:13.5px;color:#cfc8ba;line-height:1.6}

  /* three-coordinate strip (engine 4) */
  .coords{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-top:6px}
  .coord{background:var(--slate);border:1px solid var(--line);border-radius:12px;padding:18px 19px;animation:rise .5s both}
  .coord .axis{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px}
  .coord:nth-child(1) .axis{color:var(--amber)}
  .coord:nth-child(2) .axis{color:var(--teal)}
  .coord:nth-child(3) .axis{color:#c98fd6}
  .coord h4{font-family:var(--sc);font-weight:600;font-size:15px;margin-bottom:7px}
  .coord p{font-size:13.5px;color:#cfc8ba;line-height:1.62}

  .closing{
    margin-top:22px;border-left:2px solid var(--amber);padding:14px 0 14px 20px;
    font-family:var(--serif);font-style:italic;font-size:clamp(17px,2.4vw,21px);line-height:1.5;color:var(--parchment);
  }
  .spark{
    margin-top:18px;background:rgba(91,168,160,.07);border:1px solid rgba(91,168,160,.22);
    border-radius:12px;padding:16px 19px;font-size:14px;color:#cfc8ba;
  }
  .spark b{color:var(--teal);font-family:var(--sc)}

  /* learning trail */
  .trail{padding:6px 0 0}
  .trail-box{border:1px solid var(--line);border-radius:13px;background:rgba(91,168,160,.05);padding:16px 18px}
  .trail-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .trail-title{font-family:var(--sc);font-weight:600;font-size:14px;color:var(--parchment);display:flex;align-items:center;gap:8px}
  .trail-title em{font-style:normal;font-family:var(--mono);font-size:11px;color:var(--teal);border:1px solid rgba(91,168,160,.3);border-radius:20px;padding:2px 9px}
  .trail-clear{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em;transition:.16s}
  .trail-clear:hover{color:#f2a08c}
  .trail-list{display:flex;flex-direction:column;gap:4px}

  .trail-group{padding:10px 0 2px;border-top:1px solid var(--line)}
  .trail-group:first-child{border-top:none}
  .tg-head{display:flex;align-items:center;gap:9px;margin-bottom:9px}
  .tg-name{font-family:var(--sc);font-weight:600;font-size:13px;color:var(--amber);letter-spacing:.02em}
  .tg-num{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--slate);border-radius:10px;padding:1px 7px}
  .tg-items{display:flex;flex-direction:column;gap:7px}

  .trail-item{
    display:flex;flex-direction:column;gap:9px;background:var(--slate);border:1px solid var(--line-strong);
    border-left:3px solid var(--muted);border-radius:9px;padding:10px 11px 10px 13px;transition:.16s;
  }
  .trail-item.lv-0{border-left-color:var(--muted)}
  .trail-item.lv-1{border-left-color:var(--amber)}
  .trail-item.lv-2{border-left-color:var(--teal)}
  .ti-main{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .trail-item .ti-topic{font-family:var(--sc);font-weight:600;font-size:14.5px;cursor:pointer;transition:.16s}
  .trail-item .ti-topic:hover{color:var(--amber)}
  .trail-item .ti-engs{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.04em;flex:1;min-width:90px}
  .ti-levels{display:flex;gap:4px}
  .ti-lv{
    font-family:var(--sc);font-size:11px;color:var(--muted);border:1px solid var(--line-strong);
    border-radius:6px;padding:3px 9px;transition:.14s;white-space:nowrap;
  }
  .ti-lv:hover{border-color:var(--line-strong);color:var(--parchment)}
  .ti-lv.lv0.on{background:rgba(139,149,168,.22);color:var(--parchment);border-color:transparent}
  .ti-lv.lv1.on{background:var(--amber);color:var(--ink);border-color:transparent;font-weight:600}
  .ti-lv.lv2.on{background:var(--teal);color:var(--ink);border-color:transparent;font-weight:600}
  .trail-item .ti-x{color:var(--muted);font-size:15px;line-height:1;padding:0 2px;cursor:pointer;transition:.16s}
  .trail-item .ti-x:hover{color:#f2a08c}
  .ti-scenes{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding-left:1px}
  .ti-scenes-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.06em}
  .ti-scene{
    display:inline-flex;align-items:center;gap:5px;font-family:var(--sc);font-size:12.5px;color:var(--teal);
    border:1px solid rgba(91,168,160,.3);border-radius:14px;padding:3px 6px 3px 11px;transition:.14s;cursor:pointer;
  }
  .ti-scene:hover{background:rgba(91,168,160,.12);border-color:var(--teal)}
  .ti-scene-x{color:var(--muted);font-size:13px;line-height:1;padding:0 2px}
  .ti-scene-x:hover{color:#f2a08c}


  .digging{padding:54px 0;text-align:center}
  .digging .bars{display:flex;gap:5px;justify-content:center;align-items:flex-end;height:46px;margin-bottom:20px}
  .digging .bars span{width:6px;background:var(--amber);border-radius:3px;animation:dig 1s ease-in-out infinite}
  .digging .bars span:nth-child(2){animation-delay:.12s}
  .digging .bars span:nth-child(3){animation-delay:.24s}
  .digging .bars span:nth-child(4){animation-delay:.36s}
  .digging .bars span:nth-child(5){animation-delay:.48s}
  .digging p{font-family:var(--sc);color:var(--muted);font-size:14px}
  @keyframes dig{0%,100%{height:14px;opacity:.5}50%{height:46px;opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  .err{background:rgba(232,90,61,.1);border:1px solid rgba(232,90,61,.35);border-radius:12px;padding:16px 19px;color:#f0c3b8;font-size:14px}
  .err b{color:#f2a08c}

  /* key modal */

// 从足迹里点一个已存场景：打开该知识，再把存好的类比原样调回（不重新调用API）
async function replayAnalogy(topic, scene){
  const saved=getAnalogy(topic, scene);
  if(!saved) return;
  // 若结果区已经展示着该知识点，直接复用，避免重复开挖
  const already = (currentTopic===topic) && document.getElementById('aeResult');
  if(!already){
    const rec=storeGet().find(x=>x.topic===topic);
    if(rec){ activeEngine=rec.last||rec.engines[0]; renderEngines(); }
    $('#topic').value=topic;
    await go(topic);
  }
  for(let i=0;i<40;i++){
    const out=document.getElementById('aeResult');
    if(out){ renderAnalogy(out, topic, scene, saved.data); out.scrollIntoView({behavior:'smooth',block:'center'}); return; }
    await new Promise(r=>setTimeout(r,50));
  }
}

  const saved=isAnalogySaved(topic, scene);

/* ---------------- 学习足迹（本地存储，沙箱内自动退回内存） ----------------
   数据模型 v2：每个知识点一条记录
   { topic, subject, engines:[已挖过的引擎], level:0|1|2, ts }
   level: 0 刚接触 · 1 在学 · 2 已掌握 */
const TRAIL_KEY='suyuan.trail.v2';
let trail=[];
let memStore=null;
const LEVELS=[
  {k:0,label:'刚接触',cls:'lv0'},
  {k:1,label:'在学',  cls:'lv1'},
  {k:2,label:'已掌握',cls:'lv2'},
];
const SUBJECT_ORDER=['数学','物理','化学','生物','语言文学','历史社科','艺术','计算机','哲学','其它'];

function storeGet(){
  if(memStore!==null) return memStore;
  try{ const v=localStorage.getItem(TRAIL_KEY); return v?JSON.parse(v):[]; }
  catch(e){ memStore=[]; return memStore; }
}
function storeSet(arr){
  trail=arr;
  if(memStore!==null){ memStore=arr; return; }
  try{ localStorage.setItem(TRAIL_KEY,JSON.stringify(arr)); }
  catch(e){ memStore=arr; }
}

function recordTrail(topic, engine, subject){
  trail = storeGet();
  let rec = trail.find(x=>x.topic===topic);
  if(rec){
    if(!rec.engines.includes(engine)) rec.engines.push(engine);
    rec.subject = rec.subject || subject;
    rec.ts = Date.now();
    rec.last = engine;
  }else{
    rec = {topic, subject:subject||'其它', engines:[engine], last:engine, level:0, ts:Date.now()};
    trail.push(rec);
  }
  if(trail.length>120) trail = trail.slice(-120);
  storeSet(trail);
  renderTrail();
}

function setLevel(topic, level){
  trail = storeGet();
  const rec = trail.find(x=>x.topic===topic);
  if(rec){ rec.level=level; storeSet(trail); renderTrail(); }
}
function delTopic(topic){
  trail = storeGet().filter(x=>x.topic!==topic);
  storeSet(trail); renderTrail();
}

// 把一次场景类比存进对应知识点的足迹记录里（同场景覆盖更新）
function saveAnalogy(topic, scene, data){
  trail = storeGet();
  let rec = trail.find(x=>x.topic===topic);
  if(!rec){  // 理论上已存在（类比前必有结果），兜底新建
    rec = {topic, subject:'其它', engines:[activeEngine], last:activeEngine, level:0, ts:Date.now()};
    trail.push(rec);
  }
  rec.analogies = rec.analogies || [];
  const i = rec.analogies.findIndex(a=>a.scene===scene);
  const entry = {scene, data, ts:Date.now()};
  if(i>=0) rec.analogies[i]=entry; else rec.analogies.push(entry);
  storeSet(trail); renderTrail();
}
function getAnalogy(topic, scene){
  const rec = storeGet().find(x=>x.topic===topic);
  return rec && rec.analogies ? rec.analogies.find(a=>a.scene===scene) : null;
}
function isAnalogySaved(topic, scene){ return !!getAnalogy(topic, scene); }
function delAnalogy(topic, scene){
  trail = storeGet();
  const rec = trail.find(x=>x.topic===topic);
  if(rec && rec.analogies){ rec.analogies = rec.analogies.filter(a=>a.scene!==scene); storeSet(trail); renderTrail(); }
}

function renderTrail(){
  trail = storeGet();
  const sec=$('#trailSection');
  if(!trail.length){ sec.hidden=true; return; }
  sec.hidden=false;

  const total=trail.length;
  const mastered=trail.filter(x=>x.level===2).length;
  $('#trailCount').textContent = `${total} 个 · 已掌握 ${mastered}`;

  // 按学科分组
  const groups={};
  trail.forEach(x=>{ (groups[x.subject]=groups[x.subject]||[]).push(x); });
  const subjects = Object.keys(groups).sort((a,b)=>{
    const ia=SUBJECT_ORDER.indexOf(a), ib=SUBJECT_ORDER.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib);
  });

  $('#trailList').innerHTML = subjects.map(sub=>{
    const items = groups[sub].slice().sort((a,b)=>b.ts-a.ts);
    return `
    <div class="trail-group">
      <div class="tg-head"><span class="tg-name">${sub}</span><span class="tg-num">${items.length}</span></div>
      <div class="tg-items">
        ${items.map(x=>`
          <div class="trail-item lv-${x.level}" data-topic="${encodeURIComponent(x.topic)}">
            <div class="ti-main">
              <span class="ti-topic" data-open="1">${x.topic}</span>
              <span class="ti-engs">${x.engines.map(engineTag).join(' · ')}</span>
              <span class="ti-levels">
                ${LEVELS.map(l=>`<button class="ti-lv ${l.cls} ${x.level===l.k?'on':''}" data-lv="${l.k}" title="${l.label}">${l.label}</button>`).join('')}
              </span>
              <span class="ti-x" data-del="1" title="删除">×</span>
            </div>
            ${(x.analogies&&x.analogies.length)?`
              <div class="ti-scenes">
                <span class="ti-scenes-label">生活类比</span>
                ${x.analogies.map(a=>`<button class="ti-scene" data-scene="${encodeURIComponent(a.scene)}" title="重看这个类比">${a.scene}<span class="ti-scene-x" data-delscene="${encodeURIComponent(a.scene)}">×</span></button>`).join('')}
              </div>`:''}
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  // 事件绑定
  $('#trailList').querySelectorAll('.trail-item').forEach(el=>{
    const topic=decodeURIComponent(el.dataset.topic);
    const rec=trail.find(x=>x.topic===topic);
    el.querySelector('[data-open]').onclick=()=>{
      if(rec){ activeEngine=rec.last||rec.engines[0]; renderEngines(); }
      $('#topic').value=topic; go(topic);
    };
    el.querySelectorAll('.ti-lv').forEach(b=>{
      b.onclick=e=>{ e.stopPropagation(); setLevel(topic, +b.dataset.lv); };
    });
    el.querySelector('.ti-x').onclick=e=>{ e.stopPropagation(); delTopic(topic); };
    el.querySelectorAll('.ti-scene').forEach(s=>{
      s.onclick=e=>{
        if(e.target.classList.contains('ti-scene-x')) return;
        replayAnalogy(topic, decodeURIComponent(s.dataset.scene));
      };
    });
    el.querySelectorAll('.ti-scene-x').forEach(x=>{
      x.onclick=e=>{ e.stopPropagation(); delAnalogy(topic, decodeURIComponent(x.dataset.delscene)); };
    });
  });
}

$('#trailClear').onclick=()=>{ storeSet([]); renderTrail(); };

/* ---------------- 主流程 ---------------- */
async function go(topic, forceLive){
  topic=(topic||'').trim();
  if(!topic) return;

  const hit = PRESET[topic];

  // 预置命中当前引擎，且不是强制实时 → 渲染精选内容（带"实时重挖"入口）
  if(hit && hit[activeEngine] && !forceLive){
    render(hit[activeEngine], {preset:true});
    return;
  }

  // 未连接（本地 file:// 演示模式）
  if(!isConnected()){
    if(hit){
      const has = Object.keys(hit).filter(k=>ENGINE_IDS.includes(k)).map(engineTag).join(' / ');
      canvas.innerHTML=`<div class="err"><b>「${topic}」暂无「${engineTag(activeEngine)}」的预置版本 ▸</b> 它已备好：${has}。换一个引擎即可查看。（本地直接打开为演示模式；部署到服务器后即可实时开挖任意内容。）</div>`;
    }else{
      canvas.innerHTML=`<div class="err"><b>演示模式 ▸</b> 「${topic}」不在预置样例中。本地直接打开仅能查看预置样例；部署到服务器后，任意知识点都能实时开挖。</div>`;
    }
    return;
  }

  // 实时生成（非预置知识点，或预置点了"实时重挖"，或预置缺当前引擎）
  showDigging();
  try{
    const data = await generate(topic, activeEngine);
    render(data, {live:true});
  }catch(err){
    showError(err.message||'生成失败，请稍后重试。');
  }
}

/* ---------------- DeepSeek 实时生成 ----------------
   提示词内置"回到发生现场"教学法，要求严格 JSON 输出。 */
function buildPrompt(topic, engine){
  const base = `你是一位"发生现场"教学法专家。你的铁律：不交付现成结论，而是把知识点还原回它诞生的过程，让学习者站在"边界尚未形成、东西正在长出来"的位置上理解它。语言面向通用学习者，平实、具体、有画面感，禁止空泛套话。只输出 JSON，不要任何额外文字、不要markdown代码块。除下方要求的字段外，JSON 顶层必须额外包含一个 "subject" 字段，取值为该知识点最主要归属的学科，只能从以下之一中选：数学、物理、化学、生物、语言文学、历史社科、艺术、计算机、哲学、其它。`;

  const schemas = {
    chain:`针对知识点「${topic}」，还原它的发生链。输出JSON：
{"title":"${topic}","sub":"一句话点出它诞生时的核心张力",
"layers":[
{"tier":"课本交给你的结晶","t":"通常的标准定义（加引号）","p":"指出这个定义抹掉了什么发生过程"},
{"tier":"撞上的麻烦","t":"人类当初遇到的具体问题","p":"用具体场景说清这个麻烦"},
{"tier":"走不通的路","t":"曾经的错误尝试或长期障碍","p":"为什么走不通"},
{"tier":"让它收敛的突破","t":"关键的认知转身","p":"哪一步突破让它成型","origin":true}],
"closing":"一句穿透性的话，点出这个知识点真正难在哪",
"spark":"以'X（学科）、Y（学科）'的形式，指出哪些不同学科共享这同一个知识点，因为它们撞上同一种麻烦"}`,

    fork:`针对「${topic}」，回到它所属的、学科边界尚未形成的"元问题"，展示多门学科如何从这一处分叉。输出JSON：
{"title":"${topic}",
"root":{"tier":"回到边界之前的元问题","q":"那个跨学科的共同问题（一句话，疑问句）","p":"说明这在当时不是单一学科问题，而是几门学科共同的难题"},
"branches":[{"disc":"学科名","h":"该学科从中长出的具体分支","p":"如何分叉出来的"}（3到4个不同学科）],
"closing":"点出这些学科今天虽分属不同领域，但在该知识点诞生时本是同一问题的不同侧面",
"spark":"一句关于'真正的跨学科是回到分家之前'的洞见"}`,

    growth:`针对「${topic}」，展示它作为同一个概念贯穿不同学段的成长轨迹（不是不同知识点，是同一棵树在长大）。输出JSON：
{"title":"${topic}","sub":"一句话说明它从小就在，只是没被这样讲过",
"layers":[
{"tier":"原初形态 · 小学（或最早接触）","t":"它最朴素的祖先形态","p":"说明"},
{"tier":"成长形态 · 初中","t":"长大一截后的样子","p":"说明"},
{"tier":"成长形态 · 高中","t":"再长大一截","p":"说明"},
{"tier":"成熟形态 · 大学","t":"成熟态，但内核未变","p":"说明内核与最初一致","origin":true}],
"closing":"点出这几截是同一概念的不同'年龄'，分开背正是学不会的根源",
"spark":"给学习者一句可操作的话：卡住时回到最早那一截"}`,

    coord:`针对「${topic}」，把它同时放回三层坐标来理解。输出JSON：
{"title":"${topic}","sub":"同一个知识点，三层同时在场",
"coords":[
{"axis":"意图层 · 人类想干什么","t":"它回应的人类意图","p":"说明"},
{"axis":"条件层 · 它依赖什么才可能","t":"它出现所依赖的前置条件","p":"说明"},
{"axis":"起点层 · 你此刻卡在哪","t":"学习者最常见的认知卡点","p":"如何跨过"}],
"closing":"点出知识记不住，往往是只在条件层讲了定义，没接上意图层与学习者的起点"}`
  };
  return base+'\n\n'+schemas[engine];
}

async function callProxy(prompt, temperature){
  const res = await fetch(PROXY_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ messages:[{role:'user',content:prompt}], temperature: temperature ?? 0.7 })
  });
  if(!res.ok){
    if(res.status===401||res.status===402)
      throw new Error('服务器调用 DeepSeek 失败（'+res.status+'）：请检查 Render 环境变量 DEEPSEEK_API_KEY 是否填好，以及 DeepSeek 账户是否有余额。');
    throw new Error('实时生成失败（'+res.status+'），请稍后重试。');
  }
  const j = await res.json();
  let txt = j.choices?.[0]?.message?.content || '';
  txt = txt.replace(/```json|```/g,'').trim();
  try{ return JSON.parse(txt); }
  catch(e){ throw new Error('生成内容解析失败，请重试一次。'); }
}

async function generate(topic, engine){
  return callProxy(buildPrompt(topic, engine), 0.7);
}

async function generateAnalogy(topic, scene){
  return callProxy(buildAnalogyPrompt(topic, scene), 0.85);
}

/* 费曼类比提示词：
   先在内部用"发生骨架"解构知识（条件土壤 / 关键转折路径 / 显露的结构 / 为何有价值），
   这层只用于思考、绝不输出、绝不出现任何专有术语；
   再把这套骨架逐一映射到用户选的日常场景，全程大白话。 */
function buildAnalogyPrompt(topic, scene){
  return `你是费曼式类比讲解高手。任务：用「${scene}」这个日常场景，把「${topic}」讲到让外行恍然大悟。

请在心里先完成一步分析（不要输出这一步、不要出现任何理论术语）：
这个知识当初是在什么样的条件下出现的？经过哪个关键转折/突破才成型？它最终让什么东西稳定地显露出来？它为什么值得被掌握？
把这套"发生骨架"想清楚后，再去「${scene}」里找一一对应的环节。

然后只输出 JSON（不要 markdown 代码块、不要多余文字），结构如下：
{
 "hook": "一句话开场，用${scene}里一个具体画面，让人立刻有共鸣",
 "mappings": [
   {"life": "${scene}里的某个具体环节/东西", "concept": "它对应${topic}里的哪个部分，一句话说清"}
   （给 3 到 5 条，覆盖这个知识最核心的几个环节，让对应关系看得见）
 ],
 "walkthrough": "用${scene}把${topic}的来龙去脉顺一遍，2-4句，像跟朋友聊天，不堆术语",
 "aha": "一句点睛：理解了${scene}里这件事，你就理解了${topic}的灵魂",
 "limit": "诚实指出这个类比在哪里会失真、不能照搬到哪一步（一句话）"
}

铁律：全程禁止出现任何学术或理论专有名词（包括但不限于'结构''差异''纠缠''发生''稳定性''范式'等抽象黑话），只用${scene}里的大白话和${topic}本身的常识说法。让一个只懂${scene}、完全不懂${topic}的人也能看懂。`;
}
